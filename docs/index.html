<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slack Log Viewer</title>

<style>
:root {
--bg:#1a1d21;
--sidebar-bg:#19171d;
--sidebar-hover:#27242c;
--sidebar-active:#3d3640;
--border:#2e2e2e;
--text:#d1d2d3;
--text-muted:#7a7f87;
--text-bright:#f2f3f5;
--accent:#4a9eed;
--green:#2bac76;
--input-bg:#2c2d30;
--thread-border:#3d3640;
--hover-bg:#222529;
}

body {
margin:0;
background:var(--bg);
color:var(--text);
font-family:sans-serif;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

#app {
display:flex;
height:100vh;
flex-direction:column;
}

.workspace-bar {
background:#0f0c13;
display:flex;
align-items:center;
padding:0 16px;
height:40px;
border-bottom:1px solid #2a2a2a;
}

.workspace-name {
font-size:14px;
font-weight:bold;
color:var(--text-bright);
}

.main-layout {
display:flex;
flex:1;
overflow:hidden;
}

.sidebar {
width:240px;
background:var(--sidebar-bg);
border-right:1px solid var(--border);
overflow-y:auto;
}

.channel-item {
padding:6px 12px;
cursor:pointer;
}

.channel-item:hover {
background:var(--sidebar-hover);
}

.main-content {
flex:1;
overflow:hidden;
display:flex;
flex-direction:column;
}

.messages-container {
flex:1;
overflow-y:auto;
padding:20px;
}

.msg-group {
display:flex;
gap:10px;
padding:4px;
}

.msg-avatar {
width:36px;
height:36px;
background:var(--accent);
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
}

.msg-text {
white-space:pre-wrap;
}
</style>
</head>

<body>

<div id="app">
<div class="workspace-bar">
<span class="workspace-name">Slack Logs</span>
</div>

<div class="main-layout">
<div class="sidebar" id="channel-list"></div>
<div class="main-content">
<div class="messages-container" id="messages-container">
読み込み中...
</div>
</div>
</div>
</div>

<script>

let allChannels = {}
let allUsers = {}
let currentMessages = []

async function fetchJSON(path){
try{
const r = await fetch(path)
if(!r.ok) return null
return await r.json()
}catch{
return null
}
}

async function init(){

const [channels,users] = await Promise.all([
fetchJSON("data/channels.json"),
fetchJSON("data/users.json")
])

allChannels = channels || {}
allUsers = users || {}

renderChannelList()

}

function renderChannelList(){
const list = document.getElementById("channel-list")
list.innerHTML=""

Object.entries(allChannels).forEach(([id,meta])=>{
const el = document.createElement("div")
el.className="channel-item"
el.textContent="# "+meta.name
el.onclick=()=>selectChannel(id)
list.appendChild(el)
})
}

async function selectChannel(id){

document.getElementById("messages-container").innerHTML="読み込み中..."

const data = await fetchJSON(`data/${id}.json`)
if(!data || !data.messages){
document.getElementById("messages-container").innerHTML="メッセージなし"
return
}

currentMessages = data.messages
renderMessages()

}

function renderMessages(){

const container=document.getElementById("messages-container")
container.innerHTML=""

currentMessages.forEach(msg=>{

const user = allUsers[msg.user] || {name:"?"}

const el=document.createElement("div")
el.className="msg-group"

el.innerHTML=`
<div class="msg-avatar">${user.name?.charAt(0) || "?"}</div>
<div>
<div><b>${user.name || "unknown"}</b></div>
<div class="msg-text">${escapeHtml(msg.text || "")}</div>
</div>
`

container.appendChild(el)

})

}

function escapeHtml(text){
return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
}

window.addEventListener("DOMContentLoaded", init)

</script>

</body>
</html>
