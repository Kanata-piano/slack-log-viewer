<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack Log Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
    :root {
      --bg: #1a1d21; --sidebar-bg: #19171d; --sidebar-hover: #27242c; --sidebar-active: #3d3640;
      --main-bg: #1a1d21; --border: #2e2e2e; --text: #d1d2d3; --text-muted: #7a7f87;
      --text-bright: #f2f3f5; --accent: #4a9eed; --accent2: #e01e5a; --green: #2bac76;
      --thread-border: #3d3640; --hover-bg: #222529; --input-bg: #2c2d30; --tag-bg: #2c3e5e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #password-screen { position: fixed; inset: 0; background: #0f1014; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
    .pw-box { background: #1a1d21; border: 1px solid #333; border-radius: 12px; padding: 48px 52px; width: 420px; text-align: center; }
    .pw-logo { font-size: 42px; margin-bottom: 8px; }
    .pw-title { font-size: 22px; font-weight: 900; color: var(--text-bright); margin-bottom: 6px; letter-spacing: -0.5px; }
    .pw-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
    .pw-input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid #3d3d3d; border-radius: 8px; color: var(--text-bright); font-size: 16px; font-family: 'IBM Plex Mono', monospace; outline: none; margin-bottom: 16px; transition: border-color 0.2s; text-align: center; letter-spacing: 4px; }
    .pw-input:focus { border-color: var(--accent); }
    .pw-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .pw-btn:hover { opacity: 0.88; }
    .pw-error { color: var(--accent2); font-size: 13px; margin-top: 12px; display: none; }
    #app { display: none; height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }
    .workspace-bar { background: #0f0c13; display: flex; align-items: center; padding: 0 16px; height: 40px; border-bottom: 1px solid #2a2a2a; gap: 12px; flex-shrink: 0; }
    .workspace-name { font-size: 14px; font-weight: 900; color: var(--text-bright); letter-spacing: -0.3px; }
    .workspace-badge { background: var(--green); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
    .workspace-bar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .last-updated { font-size: 11px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 240px; min-width: 200px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    .sidebar-section { padding: 20px 12px 8px; }
    .sidebar-section-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 8px 8px; display: flex; align-items: center; justify-content: space-between; }
    .channel-count { font-size: 11px; background: var(--sidebar-active); color: var(--text-muted); padding: 1px 6px; border-radius: 10px; }
    .sidebar-channels { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
    .sidebar-channels::-webkit-scrollbar { width: 4px; }
    .sidebar-channels::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .channel-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--text-muted); transition: background 0.1s, color 0.1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .channel-item:hover { background: var(--sidebar-hover); color: var(--text); }
    .channel-item.active { background: var(--sidebar-active); color: var(--text-bright); font-weight: 700; }
    .channel-item .ch-icon { font-size: 13px; opacity: 0.6; flex-shrink: 0; }
    .channel-item.active .ch-icon { opacity: 1; }
    .sidebar-search { padding: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .search-input { width: 100%; background: var(--input-bg); border: 1px solid transparent; border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; outline: none; font-family: 'Lato', sans-serif; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .global-search-mode .sidebar-channels { opacity: 0.4; pointer-events: none; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .channel-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--main-bg); }
    .channel-header-name { font-size: 16px; font-weight: 900; color: var(--text-bright); letter-spacing: -0.3px; }
    .channel-header-info { font-size: 13px; color: var(--text-muted); margin-left: auto; font-family: 'IBM Plex Mono', monospace; }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px 20px 40px; scroll-behavior: smooth; }
    .messages-container::-webkit-scrollbar { width: 6px; }
    .messages-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .msg-group { display: flex; gap: 10px; padding: 4px 8px; border-radius: 8px; transition: background 0.1s; margin-bottom: 2px; }
    .msg-group:hover { background: var(--hover-bg); }
    .msg-avatar { width: 36px; height: 36px; border-radius: 6px; background: linear-gradient(135deg, var(--accent), #6c47ff); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: white; overflow: hidden; margin-top: 2px; }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-body { flex: 1; min-width: 0; }
    .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .msg-name { font-size: 14px; font-weight: 700; color: var(--text-bright); cursor: pointer; }
    .msg-name:hover { text-decoration: underline; }
    .msg-time { font-size: 11px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
    .msg-channel-tag { font-size: 11px; background: var(--tag-bg); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-weight: 700; cursor: pointer; }
    .msg-channel-tag:hover { opacity: 0.8; }
    .bot-tag { font-size: 10px; background: var(--tag-bg); color: var(--accent); padding: 1px 5px; border-radius: 3px; font-weight: 700; }
    .msg-text { font-size: 14px; line-height: 1.6; color: var(--text); word-break: break-word; white-space: pre-wrap; }
    .msg-text a { color: var(--accent); text-decoration: none; }
    .msg-text a:hover { text-decoration: underline; }
    .msg-text code { background: #2d2d2d; padding: 1px 5px; border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #e06c75; }
    .msg-text pre { background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 10px 12px; margin: 4px 0; overflow-x: auto; }
    .msg-text pre code { background: none; padding: 0; color: #abb2bf; font-size: 12px; }
    .thread-toggle { display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; font-size: 12px; color: var(--accent); cursor: pointer; padding: 3px 0; border: none; background: none; font-family: 'Lato', sans-serif; }
    .thread-toggle:hover { text-decoration: underline; }
    .thread-toggle .reply-count { font-weight: 700; }
    .thread-replies { margin-top: 6px; border-left: 2px solid var(--thread-border); padding-left: 12px; display: none; }
    .thread-replies.open { display: block; }
    .reply-msg { display: flex; gap: 8px; padding: 3px 6px; border-radius: 6px; transition: background 0.1s; margin-bottom: 1px; }
    .reply-msg:hover { background: var(--hover-bg); }
    .reply-avatar { width: 24px; height: 24px; border-radius: 4px; background: linear-gradient(135deg, #e01e5a, #6c47ff); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: white; overflow: hidden; margin-top: 2px; }
    .reply-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .reply-body { flex: 1; min-width: 0; }
    .reply-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 1px; }
    .reply-name { font-size: 13px; font-weight: 700; color: var(--text-bright); }
    .reply-time { font-size: 11px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
    .reply-text { font-size: 13px; line-height: 1.5; color: var(--text); word-break: break-word; white-space: pre-wrap; }
    .date-divider { display: flex; align-items: center; gap: 12px; padding: 16px 0 8px; color: var(--text-muted); font-size: 12px; font-weight: 700; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .loading { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-muted); font-size: 14px; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .msg-search-bar { padding: 8px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .msg-search-input { background: var(--input-bg); border: 1px solid transparent; border-radius: 6px; padding: 6px 12px; color: var(--text); font-size: 13px; outline: none; font-family: 'Lato', sans-serif; width: 320px; max-width: 100%; }
    .msg-search-input:focus { border-color: var(--accent); }
    .msg-search-input::placeholder { color: var(--text-muted); }
    .global-search-status { font-size: 12px; color: var(--text-muted); padding: 4px 20px 0; }
    /* ж§ЬзіҐгГПгВ§гГ©гВ§гГИ */
    .search-highlight {
      color: #ff4444;
      font-weight: 700;
      background: rgba(255, 68, 68, 0.12);
      border-radius: 2px;
      padding: 0 2px;
    }
    /* гВЄгГ£гГ≥гГЧгГЬгВњгГ≥ */
    .jump-btn {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid var(--accent);
      background: none;
      opacity: 0.7;
      transition: opacity 0.15s;
      white-space: nowrap;
      font-family: 'Lato', sans-serif;
    }
    .jump-btn:hover { opacity: 1; }
    .reply-header .jump-btn { font-size: 10px; padding: 1px 5px; }
    /* гГХгГ©гГГгВЈгГ•гВҐгГЛгГ°гГЉгВЈгГІгГ≥ */
    @keyframes msg-flash {
      0%   { background: rgba(74, 158, 237, 0.28); }
      70%  { background: rgba(74, 158, 237, 0.10); }
      100% { background: transparent; }
    }
    .msg-flash { animation: msg-flash 2s ease-out forwards !important; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="password-screen">
    <div class="pw-box">
      <div class="pw-logo">рЯТђ</div>
      <div class="pw-title">Slack Log Viewer</div>
      <div class="pw-subtitle">гВҐгВѓгВїгВєгБЂгБѓгГСгВєгГѓгГЉгГЙгБМењЕи¶БгБІгБЩ</div>
      <input type="password" class="pw-input" id="pw-input" placeholder="вЛѓвЛѓвЛѓвЛѓвЛѓвЛѓвЛѓвЛѓ" />
      <button class="pw-btn" onclick="checkPassword()">гГ≠гВ∞гВ§гГ≥</button>
      <div class="pw-error" id="pw-error">гГСгВєгГѓгГЉгГЙгБМж≠£гБЧгБПгБВгВКгБЊгБЫгВУ</div>
    </div>
  </div>
  <div id="app">
    <div class="workspace-bar">
      <span class="workspace-name" id="workspace-name">Slack Logs</span>
      <span class="workspace-badge">archived</span>
      <div class="workspace-bar-right">
        <span class="last-updated" id="last-updated"></span>
      </div>
    </div>
    <div class="main-layout">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-search">
          <input class="search-input" placeholder="рЯФН еЕ®ж§ЬзіҐ..." id="global-search" oninput="onGlobalSearch()" />
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">
            гГБгГ£гГ≥гГНгГЂ
            <span class="channel-count" id="channel-count">0</span>
          </div>
        </div>
        <div class="sidebar-channels" id="channel-list"></div>
      </div>
      <div class="main-content">
        <div class="channel-header" id="channel-header" style="display:none">
          <span style="font-size:18px">#</span>
          <span class="channel-header-name" id="channel-header-name"></span>
          <span class="channel-header-info" id="channel-header-info"></span>
        </div>
        <div class="msg-search-bar" id="msg-search-bar" style="display:none">
          <input class="msg-search-input" placeholder="рЯФН гБУгБЃгГБгГ£гГ≥гГНгГЂеЖЕгВТж§ЬзіҐ..." id="msg-search" oninput="filterMessages()" />
        </div>
        <div class="global-search-status" id="global-search-status" style="display:none"></div>
        <div class="messages-container" id="messages-container">
          <div class="empty-state">
            <div class="icon">рЯТђ</div>
            <p>гГБгГ£гГ≥гГНгГЂгВТйБЄжКЮгБЧгБ¶гБПгБ†гБХгБД</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const PASSWORD_HASH = "";
    let allChannels = {}, allUsers = {}, currentChannel = null, currentMessages = [], allChannelItems = [];
    let allChannelData = {};
    let globalSearchTimer = null;
    let isGlobalSearching = false;
    let pendingScroll = null; // { parentTs, replyTs }

    async function generateHash(pw) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkPassword() {
      const val = document.getElementById("pw-input").value;
      if (!PASSWORD_HASH) { unlock(); return; }
      const hash = await generateHash(val);
      if (hash === PASSWORD_HASH) {
        sessionStorage.setItem("slv_auth", hash);
        unlock();
      } else {
        document.getElementById("pw-error").style.display = "block";
        document.getElementById("pw-input").value = "";
      }
    }

    document.getElementById("pw-input").addEventListener("keydown", e => {
      if (e.key === "Enter") checkPassword();
    });

    function unlock() {
      document.getElementById("password-screen").style.display = "none";
      document.getElementById("app").classList.add("visible");
      init();
    }

    (async () => {
      if (!PASSWORD_HASH) { unlock(); return; }
      const saved = sessionStorage.getItem("slv_auth");
      if (saved && saved === PASSWORD_HASH) { unlock(); }
    })();

    async function fetchJSON(path) {
      try {
        const r = await fetch(path);
        if (!r.ok) return null;
        return await r.json();
      } catch { return null; }
    }

    async function init() {
      const [channels, users, state] = await Promise.all([
        fetchJSON("data/channels.json"),
        fetchJSON("data/users.json"),
        fetchJSON("data/state.json")
      ]);
      allUsers = users || {};
      allChannels = channels || {};
      if (state?.last_run) {
        const d = new Date(state.last_run);
        document.getElementById("last-updated").textContent = "жЬАзµВжЫіжЦ∞: " + d.toLocaleString("ja-JP", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
      }
      renderChannelList(allChannels);
    }

    function renderChannelList(channels) {
      const list = document.getElementById("channel-list");
      list.innerHTML = "";
      allChannelItems = [];
      const sorted = Object.entries(channels).sort((a,b) => a[1].name.localeCompare(b[1].name));
      document.getElementById("channel-count").textContent = sorted.length;
      for (const [id, meta] of sorted) {
        const el = document.createElement("div");
        el.className = "channel-item";
        el.dataset.id = id;
        el.dataset.name = meta.name;
        const icon = meta.is_private ? "рЯФТ" : "#";
        el.innerHTML = `<span class="ch-icon">${icon}</span><span>${escapeHtml(meta.name)}</span>`;
        if (meta.archived) el.style.opacity = "0.5";
        el.onclick = () => {
          document.getElementById("global-search").value = "";
          exitGlobalSearch();
          selectChannel(id, meta);
        };
        list.appendChild(el);
        allChannelItems.push(el);
      }
    }

    // ===== ж§ЬзіҐгГПгВ§гГ©гВ§гГИ =====
    function highlightText(html, query) {
      if (!query) return html;
      // гВѓгВ®гГ™гВТгВ®гВєгВ±гГЉгГЧгБЧгБ¶regexеЃЙеЕ®гБЂгБЩгВЛ
      const escapedQuery = escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escapedQuery})`, 'gi');
      // HTMLгВњгВ∞гВТеИЖеЙ≤гБЧгБ¶гАБгГЖгВ≠гВєгГИгГОгГЉгГЙйГ®еИЖгБЃгБњгГПгВ§гГ©гВ§гГИ
      return html.split(/(<[^>]+>)/).map(part => {
        if (part.startsWith('<')) return part; // HTMLгВњгВ∞гБѓгБЭгБЃгБЊгБЊ
        return part.replace(regex, '<span class="search-highlight">$1</span>');
      }).join('');
    }

    // ===== еЕ®ж§ЬзіҐ =====
    async function onGlobalSearch() {
      const q = document.getElementById("global-search").value.trim();
      clearTimeout(globalSearchTimer);
      if (!q) { exitGlobalSearch(); return; }
      globalSearchTimer = setTimeout(() => runGlobalSearch(q), 300);
    }

    function exitGlobalSearch() {
      isGlobalSearching = false;
      document.getElementById("sidebar").classList.remove("global-search-mode");
      document.getElementById("global-search-status").style.display = "none";
      for (const el of allChannelItems) el.style.display = "";
    }

    async function runGlobalSearch(q) {
      isGlobalSearching = true;
      document.getElementById("sidebar").classList.add("global-search-mode");
      const statusEl = document.getElementById("global-search-status");
      statusEl.style.display = "block";
      statusEl.textContent = "ж§ЬзіҐдЄ≠...";

      const channelIds = Object.keys(allChannels);
      await Promise.all(channelIds.map(async id => {
        if (!allChannelData[id]) {
          const data = await fetchJSON(`data/${id}.json`);
          allChannelData[id] = data?.messages || [];
        }
      }));

      const ql = q.toLowerCase();
      const results = [];

      for (const id of channelIds) {
        const meta = allChannels[id];
        const messages = allChannelData[id] || [];
        for (const msg of messages) {
          if (msg.subtype === "channel_join" || msg.subtype === "channel_leave") continue;
          const msgText = (msg.text || "").toLowerCase();
          const user = allUsers[msg.user];
          const msgName = (user?.display_name || user?.name || "").toLowerCase();
          const msgHit = msgText.includes(ql) || msgName.includes(ql);

          const replies = msg.replies_data || [];
          const matchedReplies = replies.filter(r => {
            const rt = (r.text || "").toLowerCase();
            const ru = allUsers[r.user];
            const rn = (ru?.display_name || ru?.name || "").toLowerCase();
            return rt.includes(ql) || rn.includes(ql);
          });

          if (msgHit || matchedReplies.length > 0) {
            results.push({ channelId: id, channelName: meta.name, msg, matchedReplies, msgHit });
          }
        }
      }

      if (document.getElementById("global-search").value.trim() !== q) return;

      statusEl.textContent = `еЕ®гГБгГ£гГ≥гГНгГЂж§ЬзіҐ: ${results.length} дїґгГТгГГгГИ`;
      document.getElementById("channel-header").style.display = "flex";
      document.getElementById("channel-header-name").textContent = `еЕ®ж§ЬзіҐ: "${q}"`;
      document.getElementById("channel-header-info").textContent = `${results.length} дїґ`;
      document.getElementById("msg-search-bar").style.display = "none";
      renderGlobalResults(results, q);
    }

    // ===== гВЄгГ£гГ≥гГЧж©ЯиГљ =====
    async function navigateToMessage(channelId, parentTs, replyTs) {
      pendingScroll = { parentTs, replyTs: replyTs || null };
      // гВ∞гГ≠гГЉгГРcГЂж§ЬзіҐгВТгВѓгГ™гВҐ
      document.getElementById("global-search").value = "";
      exitGlobalSearch();
      const meta = allChannels[channelId];
      if (!meta) return;
      if (currentChannel === channelId) {
        // гБЩгБІгБЂеРМгБШгГБгГ£гГ≥гГНгГЂгБЂгБДгВЛе†іеРИпЉЪж§ЬзіҐгВТгВѓгГ™гВҐгБЧгБ¶еЖНжППзФї
        document.getElementById("msg-search").value = "";
        renderMessages(currentMessages);
      } else {
        // еИ•гГБгГ£гГ≥гГНгГЂгБЂзІїеЛХ
        await selectChannel(channelId, meta);
      }
    }

    function renderGlobalResults(results, q) {
      const container = document.getElementById("messages-container");
      container.innerHTML = "";
      if (results.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">рЯФН</div><p>и©≤ељУгБЩгВЛгГ°гГГгВїгГЉгВЄгБМи¶ЛгБ§гБЛгВКгБЊгБЫгВУгБІгБЧгБЯ</p></div>';
        return;
      }
      let lastChannel = null;
      for (const { channelId, channelName, msg, matchedReplies, msgHit } of results) {
        if (channelName !== lastChannel) {

        const group = buildMsgGroupEl(msg, {
          openReplies: matchedReplies.length > 0,
          highlightQuery: q,
          onlyMatchedReplies: true,
          repliesToShow: matchedReplies,

      }
      container.scrollTop = 0;
    }

    // ===== гГБгГ£гГ≥гГНгГЂеЖЕж§ЬзіҐ =====
    function filterMessages() {
      const rawQ = document.getElementById("msg-search").value.trim();
      const q = rawQ.toLowerCase();
      if (!rawQ) {
        renderMessages(currentMessages);
        return;
      }
      const filtered = currentMessages.filter(m => {
        if (m.subtype === "channel_join" || m.subtype === "channel_leave") return false;
        const text = (m.text || "").toLowerCase();
        const user = allUsers[m.user];
        const name = (user?.display_name || user?.name || "").toLowerCase();
        if (text.includes(q) || name.includes(q)) return true;
        const replies = m.replies_data || [];
        return replies.some(r => {
          const rt = (r.text || "").toLowerCase();
          const ru = allUsers[r.user];
          const rn = (ru?.display_name || ru?.name || "").toLowerCase();
          return rt.includes(q) || rn.includes(q);
        });
      });
      renderMessages(filtered, rawQ);
    }

    async function selectChannel(id, meta) {
      for (const el of allChannelItems) el.classList.remove("active");
      const active = document.querySelector(`.channel-item[data-id="${id}"]`);
      if (active) active.classList.add("active");
      currentChannel = id;
      document.getElementById("channel-header").style.display = "flex";
      document.getElementById("msg-search-bar").style.display = "block";
      document.getElementById("global-search-status").style.display = "none";
      document.getElementById("channel-header-name").textContent = meta.name;
      document.getElementById("channel-header-info").textContent = "и™≠гБњиЊЉгБњдЄ≠...";
      document.getElementById("msg-search").value = "";
      document.getElementById("messages-container").innerHTML = '<div class="loading"><div class="spinner"></div>гГ°гГГгВїгГЉгВЄгВТи™≠гБњиЊЉгВУгБІгБДгБЊгБЩ...</div>';

      if (!allChannelData[id]) {
        const data = await fetchJSON(`data/${id}.json`);
        allChannelData[id] = data?.messages || [];
      }
      const messages = allChannelData[id];
      if (!messages.length) {
        document.getElementById("messages-container").innerHTML = '<div class="empty-state"><div class="icon">рЯУЭ</div><p>гГ°гГГгВїгГЉгВЄгБМгБВгВКгБЊгБЫгВУ</p></div>';
        document.getElementById("channel-header-info").textContent = "0 дїґ";
        return;
      }
      currentMessages = messages;
      document.getElementById("channel-header-info").textContent = `${currentMessages.length.toLocaleString()} дїґгБЃгГ°гГГгВїгГЉгВЄ`;
      renderMessages(currentMessages);
    }

    function renderMessages(messages, highlightQuery) {
      const container = document.getElementById("messages-container");
      container.innerHTML = "";
      let lastDate = null;
      const isSearchMode = !!highlightQuery;
      const ql = highlightQuery ? highlightQuery.toLowerCase() : null;

      for (const msg of messages) {
        if (msg.subtype === "channel_join" || msg.subtype === "channel_leave") continue;
        const ts = parseFloat(msg.ts || 0), date = new Date(ts * 1000);
        const dateStr = date.toLocaleDateString("ja-JP", {year:"numeric",month:"long",day:"numeric",weekday:"short"});
        if (dateStr !== lastDate) {
          const divider = document.createElement("div");
          divider.className = "date-divider";
          divider.textContent = dateStr;
          container.appendChild(divider);
          lastDate = dateStr;
        }

        let matchedReplies = [];
        if (isSearchMode && ql) {
          matchedReplies = (msg.replies_data || []).filter(r => {
            const rt = (r.text || "").toLowerCase();
            const ru = allUsers[r.user];
            const rn = (ru?.display_name || ru?.name || "").toLowerCase();
            return rt.includes(ql) || rn.includes(ql);
          });
        }

        const group = buildMsgGroupEl(msg, {
          openReplies: matchedReplies.length > 0,
          highlightQuery: highlightQuery || null,
          onlyMatchedReplies: isSearchMode,
          repliesToShow: isSearchMode ? matchedReplies : null,
          channelId: currentChannel
        });
        container.appendChild(group);
      }

      // гВЄгГ£гГ≥гГЧеЊМгБЃгВєгВѓгГ≠гГЉгГЂеЗ¶зРЖ
      if (pendingScroll) {
        const { parentTs, replyTs } = pendingScroll;
        pendingScroll = null;
        const parentEl = container.querySelector(`.msg-group[data-ts="${parentTs}"]`);
        if (parentEl) {
          if (replyTs) {
            // гВєгГђгГГгГЙгВТйЦЛгБП
            const threadReplies = parentEl.querySelector('.thread-replies');
            const toggleBtn = parentEl.querySelector('.thread-toggle');
            if (threadReplies && !threadReplies.classList.contains('open')) {
              threadReplies.classList.add('open');
              if (toggleBtn) {
                const count = toggleBtn.querySelector('.reply-count').textContent;
                toggleBtn.innerHTML = `рЯУЬ <span class="reply-count">${count}</span> дїґгБЃињФдњ°`;
              }
            }
            const replyEl = parentEl.querySelector(`.reply-msg[data-ts="${replyTs}"]`);
            const scrollTarget = replyEl || parentEl;
            setTimeout(() => {
              scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'center' });
              scrollTarget.classList.add('msg-flash');
              setTimeout(() => scrollTarget.classList.remove('msg-flash'), 2200);
            }, 80);
          } else {
            setTimeout(() => {
              parentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
              parentEl.classList.add('msg-flash');
              setTimeout(() => parentEl.classList.remove('msg-flash'), 2200);
            }, 80);
          }
        }
      } else {
        container.scrollTop = container.scrollHeight;
      }
    }

    function buildMsgGroupEl(msg, opts = {}) {
      const { openReplies = false, highlightQuery = null, onlyMatchedReplies = false, repliesToShow = null, channelId = null } = opts;
      const user = allUsers[msg.user] || { name: msg.username || msg.user || "дЄНжШО", display_name: "", avatar: "", is_bot: !!msg.bot_id };
      const name = user.display_name || user.name || "дЄНжШО";
      const avatarContent = user.avatar
        ? `<img src="${escapeHtml(user.avatar)}" alt="${escapeHtml(name)}" onerror="this.style.display='none'">`
        : name.charAt(0).toUpperCase();
      const ts = parseFloat(msg.ts || 0), date = new Date(ts * 1000);
      const timeStr = date.toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit"});

      let text = formatText(msg.text || "");
      if (highlightQuery) text = highlightText(text, highlightQuery);

      const allReplies = msg.replies_data || [];
      // ж§ЬзіҐгГҐгГЉгГЙгБІгБѓrepliesToShowпЉИгГТгГГгГИгБЧгБЯињФдњ°гБЃгБњпЉЙгВТдљњзФ®гАБйАЪеЄЄгГҐгГЉгГЙгБѓеЕ®ињФдњ°
      const displayReplies = (onlyMatchedReplies && repliesToShow !== null) ? repliesToShow : allReplies;
      const replyCount = displayReplies.length;

      const group = document.createElement("div");
      group.className = "msg-group";
      if (msg.ts) group.dataset.ts = msg.ts;

      // ж§ЬзіҐгГҐгГЉгГЙжЩВгБЃгВЄгГ£гГ≥гГЧгГЬгВњгГ≥
      const jumpBtn = (highlightQuery && channelId)
        ? `<button class="jump-btn" onclick="navigateToMessage('${channelId}', '${msg.ts}', null)">вЖЧ еЕГгБЃжКХз®њ</button>`
        : '';

      let repliesHtml = "";
      if (replyCount > 0) {
        const openClass = openReplies ? " open" : "";
        const icon = openReplies ? "рЯУЬ" : "рЯТђ";
        repliesHtml = `<button class="thread-toggle" onclick="toggleThread(this)">${icon} <span class="reply-count">${replyCount}</span> дїґгБЃињФдњ°</button><div class="thread-replies${openClass}">${displayReplies.map(r => renderReply(r, highlightQuery, channelId, msg.ts)).join("")}</div>`;
      }

      group.innerHTML = `<div class="msg-avatar">${avatarContent}</div><div class="msg-body"><div class="msg-header"><span class="msg-name">${escapeHtml(name)}</span>${user.is_bot ? '<span class="bot-tag">BOT</span>' : ''}<span class="msg-time">${timeStr}</span>${jumpBtn}</div><div class="msg-text">${text}</div>${repliesHtml}</div>`;
      return group;
    }

    function renderReply(msg, highlightQuery = null, channelId = null, parentTs = null) {
      const user = allUsers[msg.user] || { name: msg.username || msg.user || "дЄНжШО", display_name: "", avatar: "", is_bot: false };
      const name = user.display_name || user.name || "дЄНжШО";
      const avatarContent = user.avatar
        ? `<img src="${escapeHtml(user.avatar)}" alt="${escapeHtml(name)}" onerror="this.style.display='none'">`
        : name.charAt(0).toUpperCase();
      const ts = parseFloat(msg.ts || 0), date = new Date(ts * 1000);
      const timeStr = date.toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit"});
      let text = formatText(msg.text || "");
      if (highlightQuery) text = highlightText(text, highlightQuery);
      const jumpBtn = (highlightQuery && channelId && parentTs)
        ? `<button class="jump-btn" onclick="navigateToMessage('${channelId}', '${parentTs}', '${msg.ts}')">вЖЧ еЕГгБЃжКХз®њ</button>`
        : '';
      return `<div class="reply-msg" data-ts="${escapeHtml(String(msg.ts || ''))}"><div class="reply-avatar">${avatarContent}</div><div class="reply-body"><div class="reply-header"><span class="reply-name">${escapeHtml(name)}</span><span class="reply-time">${timeStr}</span>${jumpBtn}</div><div class="reply-text">${text}</div></div></div>`;
    }

    function toggleThread(btn) {
      const replies = btn.nextElementSibling;
      replies.classList.toggle("open");
      const isOpen = replies.classList.contains("open"), count = btn.querySelector(".reply-count").textContent;
      btn.innerHTML = `${isOpen ? "рЯУЬ" : "рЯТђ"} <span class="reply-count">${count}</span> дїґгБЃињФдњ°`;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function formatText(text) {
      let t = escapeHtml(text);
      // Slack'µµжЦЗе≠ЧгВЈгГІгГЉгГИгВ≥гГЉгГЙгВТUnicodeзµµжЦЗе≠ЧгБЂе§ЙжПЫ
      t = t.replace(/:([a-zA-Z0-9_+\-]+):/g, (m, n) => SLACK_EMOJI[n] || m);
      t = t.replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>");
      t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
      t = t.replace(/\*(\S[^*]*)\*/g, "<strong>$1</strong>");
      t = t.replace(/_(\S[^_]*)_/g, "<em>$1</em>");
      t = t.replace(/&lt;(https?:\/\/[^|&]+)\|([^&]+)&gt;/g, '<a href="$1" target="_blank" rel="noopener">$2</a>');
      t = t.replace(/&lt;(https?:\/\/[^&]+)&gt;/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
      t = t.replace(/&lt;@([A-Z0-9]+)&gt;/g, (_, uid) => {
        const u = allUsers[uid];
        return `<strong style="color:var(--accent)">@${escapeHtml(u ? (u.display_name||u.name) : uid)}</strong>`;
      });
      t = t.replace(/&lt;#([A-Z0-9]+)\|([^&]+)&gt;/g, '<strong style="color:var(--accent)">#$2</strong>');
      return t;
    }
